<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Quidon Roethof</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5ff;
    --cyan-dim: #00b8cc;
    --cyan-glow: rgba(0,245,255,0.15);
    --bg: #000000;
    --bg2: #040a0a;
    --border: rgba(0,245,255,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 2px,
      rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; } 93% { opacity: 0.85; }
    94% { opacity: 1; } 96% { opacity: 0.9; } 97% { opacity: 1; }
  }
  body { animation: flicker 8s infinite; }

  /* Nav */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(0,0,0,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  .nav-title {
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: var(--cyan-dim);
    padding: 0.4rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .nav-links {
    display: flex;
    font-family: 'VT323', monospace;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
  }
  .nav-links a {
    padding: 0.4rem 1.2rem;
    border-right: 1px solid var(--border);
    color: var(--cyan);
    text-decoration: none;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .nav-links a:hover { background: var(--cyan-glow); text-shadow: 0 0 10px var(--cyan); }

  /* Page wrap */
  .page { padding: 6rem 1.5rem 4rem; max-width: 1100px; margin: 0 auto; }

  /* Header */
  .page-header {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan-dim);
    margin-bottom: 0.4rem;
  }
  .page-sub {
    font-family: 'VT323', monospace;
    font-size: 1.2rem;
    color: var(--cyan-dim);
    letter-spacing: 0.2em;
    margin-bottom: 2.5rem;
  }

  /* Filter bar */
  .filter-bar {
    border: 1px solid var(--border);
    background: var(--bg2);
    padding: 1rem 1.2rem;
    margin-bottom: 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
  }
  .filter-label {
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    color: var(--cyan-dim);
    letter-spacing: 0.1em;
    margin-right: 0.3rem;
    white-space: nowrap;
  }
  .filter-chip {
    border: 1px solid var(--border);
    padding: 0.2rem 0.8rem;
    font-family: 'VT323', monospace;
    font-size: 1rem;
    letter-spacing: 0.05em;
    color: var(--cyan-dim);
    cursor: pointer;
    background: transparent;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .filter-chip:hover { background: var(--cyan-glow); color: var(--cyan); }
  .filter-chip.active {
    background: var(--cyan);
    color: #000;
    border-color: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
    font-weight: bold;
  }
  .filter-divider {
    width: 1px;
    height: 1.4rem;
    background: var(--border);
    margin: 0 0.3rem;
  }

  /* Results count */
  .results-count {
    font-family: 'VT323', monospace;
    font-size: 1rem;
    color: var(--cyan-dim);
    letter-spacing: 0.1em;
    margin-bottom: 1.2rem;
  }

  /* Project grid */
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 0;
    border: 1px solid var(--border);
  }

  .project-card {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .project-card::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--cyan-glow);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .project-card:hover::before { opacity: 1; }

  .card-icon-area {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 140px;
    font-size: 4rem;
    position: relative;
    overflow: hidden;
  }
  .card-icon-area::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 12px,
      rgba(0,245,255,0.03) 12px, rgba(0,245,255,0.03) 24px
    );
  }
  .card-icon { position: relative; z-index: 1; }

  .card-body { padding: 1.2rem; flex: 1; display: flex; flex-direction: column; }

  .card-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .card-desc {
    font-size: 0.78rem;
    color: var(--cyan-dim);
    line-height: 1.7;
    flex: 1;
    margin-bottom: 1rem;
  }

  .card-tags { margin-bottom: 1rem; }
  .tag {
    display: inline-block;
    border: 1px solid var(--border);
    padding: 0.1rem 0.45rem;
    font-size: 0.65rem;
    margin: 0.15rem 0.1rem;
    color: var(--cyan-dim);
    letter-spacing: 0.04em;
  }
  .tag.highlight {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 6px rgba(0,245,255,0.3);
  }

  .card-footer {
    border-top: 1px solid var(--border);
    padding: 0.8rem 1.2rem;
    display: flex;
    gap: 0.6rem;
  }

  .btn {
    display: inline-block;
    border: 1px solid var(--cyan);
    padding: 0.3rem 1rem;
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    text-decoration: none;
    color: var(--cyan);
    text-transform: uppercase;
    transition: all 0.2s;
    cursor: pointer;
    background: transparent;
  }
  .btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

  /* No results */
  .no-results {
    border: 1px solid var(--border);
    padding: 3rem;
    text-align: center;
    font-family: 'VT323', monospace;
    font-size: 1.4rem;
    color: var(--cyan-dim);
    letter-spacing: 0.2em;
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem;
    text-align: center;
    font-family: 'VT323', monospace;
    font-size: 1rem;
    color: var(--cyan-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 3rem;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .cursor { animation: blink 1s infinite; }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .project-card { animation: card-in 0.3s ease both; }
</style>
</head>
<body x-data="projects()">

<!-- NAV -->
<nav>
  <div class="nav-title">PORTFOLIO:QUIDON_ROETHOF / PROJECTS</div>
  <div class="nav-links">
    <a href="index.html">← BACK</a>
    <a href="index.html#about">ABOUT</a>
    <a href="index.html#skill">SKILLS</a>
    <a href="index.html#contact">CONTACT</a>
  </div>
</nav>

<div class="page">

  <!-- Header -->
  <div class="page-header">ALL PROJECTS</div>
  <div class="page-sub">> <span x-text="allProjects.length"></span> PROJECTS &nbsp;·&nbsp; FILTER BY LANGUAGE OR FRAMEWORK<span class="cursor">_</span></div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <span class="filter-label">> LANG:</span>
    <template x-for="lang in langs" :key="lang">
      <button
        class="filter-chip"
        :class="{ active: activeLang === lang }"
        @click="activeLang = activeLang === lang ? null : lang; activeFramework = null"
        x-text="lang">
      </button>
    </template>

    <div class="filter-divider"></div>

    <span class="filter-label">LIB:</span>
    <template x-for="fw in frameworks" :key="fw">
      <button
        class="filter-chip"
        :class="{ active: activeFramework === fw }"
        @click="activeFramework = activeFramework === fw ? null : fw; activeLang = null"
        x-text="fw">
      </button>
    </template>

    <div class="filter-divider"></div>
    <button class="filter-chip" @click="activeLang = null; activeFramework = null">[CLEAR]</button>
  </div>

  <!-- Results count -->
  <div class="results-count">
    > SHOWING <span x-text="filtered.length"></span> / <span x-text="allProjects.length"></span> PROJECTS
    <span x-show="activeLang" x-text="' — LANG: ' + activeLang"></span>
    <span x-show="activeFramework" x-text="' — LIB: ' + activeFramework"></span>
  </div>

  <!-- Grid -->
  <div x-show="filtered.length > 0" class="project-grid">
    <template x-for="(p, i) in filtered" :key="p.name">
      <div class="project-card" :style="`animation-delay: ${i * 0.05}s`">

        <div class="card-icon-area">
          <span class="card-icon" x-text="p.icon"></span>
        </div>

        <div class="card-body">
          <div class="card-name" x-text="p.name"></div>
          <p class="card-desc" x-text="p.desc"></p>
          <div class="card-tags">
            <template x-for="tag in p.tags" :key="tag">
              <span class="tag"
                :class="{ highlight: tag === activeLang || tag === activeFramework }"
                x-text="tag">
              </span>
            </template>
          </div>
        </div>

        <div class="card-footer">
          <a :href="p.git" target="_blank" class="btn">GITHUB →</a>
        </div>

      </div>
    </template>
  </div>

  <!-- No results -->
  <div x-show="filtered.length === 0" class="no-results">
    > NO PROJECTS MATCH THIS FILTER<span class="cursor">_</span>
  </div>

</div>

<footer>
  <a href="index.html" style="color:var(--cyan-dim); text-decoration:none;">← BACK TO PORTFOLIO</a>
  &nbsp;·&nbsp; QUIDON ROETHOF &nbsp;·&nbsp; <span class="cursor">_</span>
</footer>

<script src="Js/ExtraProjects.js"></script>
</body>
</html>
